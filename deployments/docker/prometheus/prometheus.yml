# Prometheus configuration for OpenPrint services monitoring.
# This config uses file-based service discovery for Docker environments.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  external_labels:
    cluster: 'openprint'
    environment: 'production'

# AlertManager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Service discovery configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # OpenPrint Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:9091']
        labels:
          service: 'auth-service'
          component: 'authentication'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'auth-service'

  # OpenPrint Registry Service
  - job_name: 'registry-service'
    static_configs:
      - targets: ['registry-service:9092']
        labels:
          service: 'registry-service'
          component: 'printer-registry'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'registry-service'

  # OpenPrint Job Service
  - job_name: 'job-service'
    static_configs:
      - targets: ['job-service:9093']
        labels:
          service: 'job-service'
          component: 'job-processing'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'job-service'

  # OpenPrint Storage Service
  - job_name: 'storage-service'
    static_configs:
      - targets: ['storage-service:9094']
        labels:
          service: 'storage-service'
          component: 'document-storage'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'storage-service'

  # OpenPrint Notification Service
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:9095']
        labels:
          service: 'notification-service'
          component: 'websocket-notifications'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'notification-service'

  # OpenPrint Analytics Service
  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:9096']
        labels:
          service: 'analytics-service'
          component: 'analytics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'analytics-service'

  # OpenPrint Organization Service
  - job_name: 'organization-service'
    static_configs:
      - targets: ['organization-service:9097']
        labels:
          service: 'organization-service'
          component: 'organization-management'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'organization-service'

  # OpenPrint Policy Service
  - job_name: 'policy-service'
    static_configs:
      - targets: ['policy-service:9098']
        labels:
          service: 'policy-service'
          component: 'policy-engine'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'policy-service'

  # OpenPrint Compliance Service
  - job_name: 'compliance-service'
    static_configs:
      - targets: ['compliance-service:9099']
        labels:
          service: 'compliance-service'
          component: 'compliance'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'compliance-service'

  # OpenPrint M365 Integration Service
  - job_name: 'm365-integration-service'
    static_configs:
      - targets: ['m365-integration-service:9101']
        labels:
          service: 'm365-integration-service'
          component: 'microsoft-365'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'm365-integration-service'

  # PostgreSQL Exporter (if using postgres_exporter) - optional
  # Uncomment when using postgres_exporter sidecar
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         service: 'postgres'
  #         component: 'database'

  # Redis Exporter (if using redis_exporter) - optional
  # Uncomment when using redis_exporter sidecar
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'
  #         component: 'cache'

  # Node Exporter (for host metrics) - optional
  # Uncomment when using node-exporter
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #       labels:
  #         service: 'node-exporter'
  #         component: 'infrastructure'

  # cAdvisor (for container metrics) - optional
  # Uncomment when using cadvisor
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #       labels:
  #         service: 'cadvisor'
  #         component: 'containers'

