version: "3.9"

services:
  # PostgreSQL 16 Database
  postgres:
    image: postgres:16-alpine
    container_name: openprint-postgres
    environment:
      POSTGRES_DB: openprint
      POSTGRES_USER: openprint
      POSTGRES_PASSWORD: openprint
      PGDATA: /var/lib/postgresql/data/pgdata
    # Remove external port exposure - only accessible within Docker network
    # Uncomment for local development:
    # ports:
    #   - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openprint -d openprint"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: openprint-redis
    command: redis-server --appendonly yes --requirepass openprint
    # Remove external port exposure - only accessible within Docker network
    # Uncomment for local development:
    # ports:
    #   - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "openprint", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # Auth Service (Port 8001)
  auth-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.auth-service
    container_name: openprint-auth-service
    environment:
      SERVER_ADDR: ":8001"
      DATABASE_URL: postgres://openprint:openprint@postgres:5432/openprint
      REDIS_URL: redis://:openprint@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-}
      SERVICE_NAME: auth-service
    ports:
      - "18001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # Registry Service (Port 8002)
  registry-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.registry-service
    container_name: openprint-registry-service
    environment:
      SERVER_ADDR: ":8002"
      DATABASE_URL: postgres://openprint:openprint@postgres:5432/openprint
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-}
      SERVICE_NAME: registry-service
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # Job Service (Port 8003)
  job-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.job-service
    container_name: openprint-job-service
    environment:
      SERVER_ADDR: ":8003"
      DATABASE_URL: postgres://openprint:openprint@postgres:5432/openprint
      REDIS_URL: redis://:openprint@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-}
      SERVICE_NAME: job-service
      PROCESSOR_WORKERS: 10
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      registry-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # Storage Service (Port 8004)
  storage-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.storage-service
    container_name: openprint-storage-service
    environment:
      SERVER_ADDR: ":8004"
      DATABASE_URL: postgres://openprint:openprint@postgres:5432/openprint
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-openprint-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-}
      SERVICE_NAME: storage-service
      MAX_UPLOAD_MB: 100
    ports:
      - "8004:8004"
    volumes:
      - storage_data:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # Notification Service (Port 8005)
  notification-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.notification-service
    container_name: openprint-notification-service
    environment:
      SERVER_ADDR: ":8005"
      DATABASE_URL: postgres://openprint:openprint@postgres:5432/openprint
      REDIS_URL: redis://:openprint@redis:6379
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-}
      SERVICE_NAME: notification-service
    ports:
      - "18005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # Dashboard Web App (Port 3000)
  dashboard:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.dashboard
    container_name: openprint-dashboard
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18001}
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      registry-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - openprint-network
    restart: unless-stopped

  # ============================================
  # Monitoring Stack
  # ============================================

  # Prometheus (Port 9090)
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: openprint-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - openprint-network
    restart: unless-stopped

  # AlertManager (Port 9093)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: openprint-alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    volumes:
      - ./alertmanager/config.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - openprint-network
    restart: unless-stopped

  # Grafana (Port 3001)
  grafana:
    image: grafana/grafana:11.1.0
    container_name: openprint-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - openprint-network
    restart: unless-stopped

  # Jaeger (Port 16686)
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: openprint-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "14250:14250"  # Jaeger collector gRPC
      - "6831:6831/udp" # Jaeger agent compact
      - "6832:6832/udp" # Jaeger agent binary
    networks:
      - openprint-network
    restart: unless-stopped

# Networks
networks:
  openprint-network:
    name: openprint-network
    driver: bridge

# Volumes
volumes:
  postgres_data:
    name: openprint-postgres-data
  redis_data:
    name: openprint-redis-data
  storage_data:
    name: openprint-storage-data
  prometheus_data:
    name: openprint-prometheus-data
  alertmanager_data:
    name: openprint-alertmanager-data
  grafana_data:
    name: openprint-grafana-data
