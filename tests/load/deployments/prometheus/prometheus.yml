# Prometheus configuration for load testing

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'openprint-load-test'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['test-cadvisor:8080']

  - job_name: 'influxdb'
    static_configs:
      - targets: ['test-influxdb:8086']

  - job_name: 'grafana'
    static_configs:
      - targets: ['test-grafana:3000']

  # Add your service endpoints here for monitoring during tests
  # - job_name: 'auth-service'
  #   static_configs:
  #     - targets: ['host.docker.internal:8001']
